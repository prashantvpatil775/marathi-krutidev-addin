<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marathi to KrutiDev</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 16px;
    }
    .card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 320px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .logo { font-size: 40px; margin-bottom: 10px; }
    h1 { font-size: 1.3em; color: #2d3748; margin-bottom: 6px; }
    .subtitle { color: #718096; font-size: 0.85em; margin-bottom: 28px; line-height: 1.5; }
    #convertBtn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      padding: 14px 0;
      width: 100%;
      font-size: 15px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(102,126,234,0.4);
      letter-spacing: 0.5px;
    }
    #convertBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }
    #convertBtn:active { transform: translateY(0); }
    #status {
      margin-top: 18px;
      font-size: 0.85em;
      min-height: 20px;
      padding: 0 8px;
      line-height: 1.4;
    }
    .success { color: #38a169; }
    .error { color: #e53e3e; }
  </style>
<script defer src="taskpane.bundle.js"></script></head>
<body>
  <div class="card">
    <div class="logo">अ → K</div>
    <h1>Marathi → KrutiDev</h1>
    <p class="subtitle">Select Unicode Marathi text in your document, then click Convert.</p>
    <button id="convertBtn">⚡ Convert to KrutiDev 10</button>
    <div id="status"></div>
  </div>
</body>
</html>
